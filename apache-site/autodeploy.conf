# Route /deploy to the PHP script
Alias /autodeploy /home/phanx/autodeploy

# Block .env*, .log, .sh, .json
<FilesMatch "(^\.env|\.env\..+$|\.(log|sh|json)$)">
    Require all denied
</FilesMatch>

# Block any subroute
<DirectoryMatch "^/home/phanx/autodeploy/.+">
    Require all denied
</DirectoryMatch>

<Directory /home/phanx/autodeploy>
    DirectoryIndex index.php
    Options -Indexes
    AllowOverride None
    Require all granted
</Directory>
